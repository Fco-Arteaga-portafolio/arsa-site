@if (isOpen) {
  <div
    class="fixed inset-0 z-[999] flex items-center justify-center bg-black/70 backdrop-blur-sm px-6"
  >
    <!-- Modal -->
    <div
      class="relative w-full max-w-xl max-h-[90vh] overflow-y-auto rounded-[2rem] border border-white/10 bg-[#0b1020] shadow-2xl overflow-hidden"
    >
      <!-- Glow -->
      <div
        class="absolute top-0 right-0 w-[300px] h-[300px] bg-blue-500/20 blur-3xl rounded-full"
      ></div>

      <!-- Content -->
      <div class="relative z-10 p-6 md:p-8">
        <!-- Header -->
        <div class="flex items-start justify-between gap-6 mb-10">
          <div>
            <div
              class="inline-flex items-center px-4 py-2 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-300 text-sm font-bold mb-6"
            >
              Diagnóstico Técnico
            </div>

            <h2 class="text-3xl font-black text-white leading-tight mb-4">
              Evaluemos tu operación tecnológica.
            </h2>

            <p class="text-slate-400 leading-relaxed">
              Cuéntanos brevemente qué problema buscan resolver y analizaremos la mejor estrategia
              técnica para tu empresa.
            </p>
          </div>

          <!-- Close -->
          <button
            type="button"
            (click)="closeModal()"
            class="text-slate-500 hover:text-white transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-7 h-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <!-- FORM -->
        <form class="space-y-6" (ngSubmit)="submitDiagnostic()">
          <!-- Grid -->
          <div class="grid md:grid-cols-2 gap-6">
            <!-- Nombre -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-3"> Nombre </label>

              <input
                type="text"
                [(ngModel)]="diagnosticForm.name"
                name="name"
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
                placeholder="Tu nombre"
              />
            </div>

            <!-- Empresa -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-3"> Empresa </label>

              <input
                type="text"
                [(ngModel)]="diagnosticForm.company"
                name="company"
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
                placeholder="Nombre de empresa"
              />
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-3">
              Correo electrónico
            </label>

            <input
              type="email"
              [(ngModel)]="diagnosticForm.email"
              name="email"
              class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-blue-500 transition-colors"
              placeholder="correo@empresa.com"
            />
          </div>

          <!-- Select -->
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-3">
              ¿Qué necesitan resolver?
            </label>

            <select
              [(ngModel)]="diagnosticForm.service"
              name="service"
              class="w-full bg-[#111827] border border-white/10 rounded-2xl px-5 py-4 text-white appearance-none focus:outline-none focus:border-blue-500 transition-colors"
            >
              <option value="" disabled>Selecciona una opción</option>

              <option value="legacy">Modernización de sistema legacy</option>

              <option value="automation">Automatización de procesos</option>

              <option value="web">Plataforma web empresarial</option>

              <option value="desktop">Sistema de escritorio</option>

              <option value="mobile">Aplicación móvil</option>

              <option value="integration">Integración de sistemas / APIs</option>

              <option value="consulting">Consultoría técnica</option>

              <option value="other">Otro</option>
            </select>
          </div>

          <!-- Problem -->
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-3">
              Describe brevemente el problema
            </label>

            <textarea
              rows="4"
              [(ngModel)]="diagnosticForm.problem"
              name="problem"
              class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-blue-500 transition-colors resize-none"
              placeholder="Ejemplo: Tenemos un sistema viejo en FoxPro y queremos migrarlo a una plataforma moderna..."
            ></textarea>
          </div>

          <!-- Footer -->
          <div
            class="pt-6 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-6"
          >
            <p class="text-sm text-slate-500 leading-relaxed max-w-md">
              Analizaremos tu operación y te contactaremos con una propuesta técnica acorde a tus
              necesidades.
            </p>

            <button
              type="submit"
              [disabled]="loading()"
              class="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-8 py-4 rounded-2xl font-black transition-all shadow-xl shadow-blue-950/40"
            >
              @if (loading()) {
                Enviando...
              } @else {
                Enviar diagnóstico
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
}
