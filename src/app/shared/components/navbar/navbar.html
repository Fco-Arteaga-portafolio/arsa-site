<header
  class="fixed top-0 left-0 w-full z-50 border-b border-white/10 bg-[#050816]/80 backdrop-blur-xl"
>
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a href="#inicio" class="flex items-center gap-4">
        <img src="/logo.png" alt="ARSA" class="h-10 w-auto" />

        <div>
          <p class="text-white font-black text-xl leading-none">AR-SA</p>

          <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mt-1">
            Enterprise Software
          </p>
        </div>
      </a>

      <!-- Navigation -->
      <nav class="hidden lg:flex items-center gap-10">
        <a href="/#servicios" class="text-slate-300 hover:text-white transition-colors font-medium">
          Servicios
        </a>

        <a
          href="/ecosistemas"
          class="text-slate-300 hover:text-white transition-colors font-medium"
        >
          Ecosistema
        </a>

        <a href="/contacto" class="text-slate-300 hover:text-white transition-colors font-medium">
          Contacto
        </a>
      </nav>

      <!-- CTA -->
      <div class="hidden lg:flex items-center gap-4">
        <button
          (click)="diagnosticService.openModal()"
          class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-950/30"
        >
          Solicitar diagnóstico
        </button>
      </div>

      <!-- Mobile -->
      <button class="lg:hidden text-white">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-8 h-8"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>
  </div>
</header>
